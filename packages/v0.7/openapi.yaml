openapi: 3.0.1
info:
  title: Crawlab API
  description: REST API for Crawlab
  version: 0.7.0
paths:
  /data/collections:
    get:
      tags:
      - Data Collections
      summary: Get Data Collection List
      description: Get a list of items
      operationId: get_data_collection_list
      parameters:
      - name: filter
        in: query
        description: Filter query
        schema:
          type: string
          description: Filter query
      - name: page
        in: query
        description: Page number
        schema:
          type: integer
          description: Page number
          format: int32
          default: 1
      - name: size
        in: query
        description: Page size
        schema:
          type: integer
          description: Page size
          format: int32
          default: 10
      - name: sort
        in: query
        description: Sort options
        schema:
          type: string
          description: Sort options
          default: -_id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllersListResponseGithubModelsDataCollection'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    post:
      tags:
      - Data Collections
      summary: Create Data Collection
      description: Create a new item
      operationId: create_data_collection
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Create_data_collectionInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllersResponseGithubModelsDataCollection'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    delete:
      tags:
      - Data Collections
      summary: Delete Data Collection List
      description: Delete multiple items
      operationId: delete_data_collection_list
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllersResponseGithubModelsDataCollection'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    patch:
      tags:
      - Data Collections
      summary: Batch Update Data Collection List
      description: Batch update multiple items with partial fields
      operationId: batch_update_data_collection_list
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Batch_update_data_collection_listInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllersResponseGithubModelsDataCollection'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /data/collections/{id}:
    get:
      tags:
      - Data Collections
      summary: Get Data Collection by ID
      description: Get a single item by ID
      operationId: get_data_collection_by_id
      parameters:
      - name: id
        in: path
        description: The ID of the item to get
        required: true
        schema:
          type: string
          description: The ID of the item to get
          format: objectid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllersResponseGithubModelsDataCollection'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    put:
      tags:
      - Data Collections
      summary: Replace Data Collection by ID
      description: Replace an item by ID with (full update)
      operationId: replace_data_collection_by_id
      parameters:
      - name: id
        in: path
        description: The ID of the item to update
        required: true
        schema:
          type: string
          description: The ID of the item to update
          format: objectid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Replace_data_collection_by_idInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllersResponseGithubModelsDataCollection'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    delete:
      tags:
      - Data Collections
      summary: Delete Data Collection by ID
      description: Delete an item by ID
      operationId: delete_data_collection_by_id
      parameters:
      - name: id
        in: path
        description: The ID of the item to delete
        required: true
        schema:
          type: string
          description: The ID of the item to delete
          format: objectid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllersResponseGithubModelsDataCollection'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    patch:
      tags:
      - Data Collections
      summary: Update Data Collection by ID
      description: Update an item by ID with (partial update)
      operationId: update_data_collection_by_id
      parameters:
      - name: id
        in: path
        description: The ID of the item to update
        required: true
        schema:
          type: string
          description: The ID of the item to update
          format: objectid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Update_data_collection_by_idInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControllersResponseGithubModelsDataCollection'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
